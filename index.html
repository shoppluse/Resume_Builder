<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI Resume Builder</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#0f172a', accent: '#3b82f6', surface: '#1e293b' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- html2pdf for native PDF downloading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; overflow: hidden; }
        
        /* A4 Page Formatting for PDF */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            margin: 0 auto;
        }
        
        /* Custom Scrollbar for the Editor */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        /* Hide UI elements during PDF generation */
        .html2pdf__container { background: white !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { motion, AnimatePresence } = window.Motion;

        const WIZARD_STEPS = [
            {
                id: 'personal',
                title: 'Personal Information',
                subtitle: 'Let’s start with the basics.',
                fields: [
                    { name: 'fullName', label: 'Full Name', type: 'text', placeholder: 'e.g. Alex Smith' },
                    { name: 'role', label: 'Professional Title', type: 'text', placeholder: 'e.g. Frontend Developer & Entrepreneur' },
                    { name: 'email', label: 'Email', type: 'email', placeholder: 'alex@example.com' },
                    { name: 'phone', label: 'Phone', type: 'text', placeholder: '+1 234 567 890' },
                    { name: 'location', label: 'Location', type: 'text', placeholder: 'City, State, Country' },
                    { name: 'links', label: 'Links (LinkedIn, GitHub, Portfolio)', type: 'text', placeholder: 'github.com/shoppluse, linkedin.com/in/alex' }
                ]
            },
            {
                id: 'summary',
                title: 'Professional Summary',
                subtitle: 'Tell us about yourself and your career objectives.',
                fields: [
                    { name: 'targetRole', label: 'Target Job Role', type: 'text', placeholder: 'e.g. Senior Frontend Engineer' },
                    { name: 'summary', label: 'Professional Summary', type: 'textarea', placeholder: 'Motivated web developer with strong knowledge in React and e-commerce platforms, seeking opportunities to build scalable rewards platforms.' }
                ]
            },
            {
                id: 'education',
                title: 'Education Details',
                subtitle: 'Where did you study?',
                fields: [
                    { name: 'degree', label: 'Degree & Specialization', type: 'text', placeholder: 'B.Sc in Computer Science' },
                    { name: 'university', label: 'College / University', type: 'text', placeholder: 'Tech University' },
                    { name: 'eduDuration', label: 'Start & End Year', type: 'text', placeholder: '2019 - 2023' },
                    { name: 'cgpa', label: 'CGPA / Percentage', type: 'text', placeholder: '3.8 / 4.0' }
                ]
            },
            {
                id: 'skills',
                title: 'Skills & Technologies',
                subtitle: 'What are your strongest technical and soft skills?',
                fields: [
                    { name: 'techSkills', label: 'Technical Skills & Frameworks', type: 'text', placeholder: 'HTML, CSS, React.js, Tailwind, Node.js' },
                    { name: 'softSkills', label: 'Soft Skills', type: 'text', placeholder: 'Leadership, Problem Solving, Agile' }
                ]
            },
            {
                id: 'experience',
                title: 'Work Experience',
                subtitle: 'List your most recent or relevant job role.',
                fields: [
                    { name: 'company', label: 'Company Name', type: 'text', placeholder: 'TechCorp Solutions' },
                    { name: 'jobTitle', label: 'Job Title', type: 'text', placeholder: 'Frontend Developer' },
                    { name: 'expDuration', label: 'Duration', type: 'text', placeholder: 'Jan 2024 - Present' },
                    { name: 'responsibilities', label: 'Key Responsibilities & Achievements', type: 'textarea', placeholder: '• Developed and optimized backend APIs.\n• Built an automatic robotic cleaning prototype for internal office use.' }
                ]
            },
            {
                id: 'projects',
                title: 'Key Projects',
                subtitle: 'Highlight a major project or application you built.',
                fields: [
                    { name: 'projTitle', label: 'Project Title', type: 'text', placeholder: 'Shoppluse Affiliate Platform' },
                    { name: 'projTech', label: 'Technologies Used', type: 'text', placeholder: 'React, Amazon API, Tailwind' },
                    { name: 'projDesc', label: 'Project Description & Contribution', type: 'textarea', placeholder: '• Built a cashback website filtering high-rated Amazon products.\n• Integrated live rewards system for user purchases.' }
                ]
            },
            {
                id: 'extras',
                title: 'Certifications & Extras',
                subtitle: 'Add any final details to make your resume stand out.',
                fields: [
                    { name: 'certifications', label: 'Certifications', type: 'text', placeholder: 'AWS Certified Developer' },
                    { name: 'languages', label: 'Languages Known', type: 'text', placeholder: 'English (Fluent), Spanish (Beginner)' },
                    { name: 'interests', label: 'Interests / Hobbies', type: 'text', placeholder: 'Robotics, Financial Markets, Open Source Contributing' }
                ]
            }
        ];

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [direction, setDirection] = useState(1);
            const [isGenerating, setIsGenerating] = useState(false);
            
            const [data, setData] = useState({
                fullName: '', role: '', email: '', phone: '', location: '', links: '',
                targetRole: '', summary: '',
                degree: '', university: '', eduDuration: '', cgpa: '',
                techSkills: '', softSkills: '',
                company: '', jobTitle: '', expDuration: '', responsibilities: '',
                projTitle: '', projTech: '', projDesc: '',
                certifications: '', languages: '', interests: ''
            });

            const handleNext = () => {
                if (currentStep < WIZARD_STEPS.length - 1) {
                    setDirection(1);
                    setCurrentStep(prev => prev + 1);
                }
            };

            const handlePrev = () => {
                if (currentStep > 0) {
                    setDirection(-1);
                    setCurrentStep(prev => prev - 1);
                }
            };

            const handleChange = (e) => {
                setData({ ...data, [e.target.name]: e.target.value });
            };

            const generatePDF = () => {
                setIsGenerating(true);
                const element = document.getElementById('resume-pdf-content');
                
                const opt = {
                    margin:       0,
                    filename:     `${data.fullName || 'Resume'}_CV.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                html2pdf().set(opt).from(element).save().then(() => {
                    setIsGenerating(false);
                });
            };

            const step = WIZARD_STEPS[currentStep];

            const variants = {
                enter: (direction) => ({ x: direction > 0 ? 50 : -50, opacity: 0 }),
                center: { x: 0, opacity: 1 },
                exit: (direction) => ({ x: direction < 0 ? 50 : -50, opacity: 0 })
            };

            return (
                <div className="flex h-screen w-full bg-slate-100 font-sans">
                    
                    {/* Left Panel: The AI Editor */}
                    <div className="w-full md:w-5/12 bg-brand text-white flex flex-col relative z-10 shadow-2xl">
                        
                        {/* Header */}
                        <div className="p-8 pb-0 flex justify-between items-center shrink-0">
                            <div className="text-xl font-bold tracking-tight">Resume<span className="text-accent">AI</span></div>
                            <div className="text-sm font-medium text-slate-400 bg-surface px-3 py-1 rounded-full">
                                {currentStep + 1} / {WIZARD_STEPS.length}
                            </div>
                        </div>

                        {/* Progress Bar */}
                        <div className="w-full bg-surface h-1 mt-6 shrink-0">
                            <motion.div 
                                className="bg-accent h-full" 
                                initial={{ width: 0 }}
                                animate={{ width: `${((currentStep + 1) / WIZARD_STEPS.length) * 100}%` }}
                                transition={{ duration: 0.3 }}
                            />
                        </div>

                        {/* Form Area */}
                        <div className="flex-1 overflow-y-auto custom-scroll relative px-8 py-8">
                            <AnimatePresence mode="wait" custom={direction}>
                                <motion.div
                                    key={currentStep}
                                    custom={direction}
                                    variants={variants}
                                    initial="enter"
                                    animate="center"
                                    exit="exit"
                                    transition={{ type: "tween", duration: 0.25 }}
                                    className="w-full max-w-md mx-auto"
                                >
                                    <h2 className="text-3xl font-bold mb-2">{step.title}</h2>
                                    <p className="text-slate-400 mb-8">{step.subtitle}</p>

                                    <div className="space-y-6">
                                        {step.fields.map(field => (
                                            <div key={field.name}>
                                                <div className="flex justify-between mb-2">
                                                    <label className="block text-sm font-medium text-slate-300">{field.label}</label>
                                                    {field.type === 'textarea' && <span className="text-xs text-accent cursor-pointer hover:underline">✨ AI Enhance</span>}
                                                </div>
                                                
                                                {field.type === 'textarea' ? (
                                                    <textarea 
                                                        name={field.name}
                                                        value={data[field.name]}
                                                        onChange={handleChange}
                                                        placeholder={field.placeholder}
                                                        rows={field.name === 'responsibilities' || field.name === 'projDesc' ? 5 : 3}
                                                        className="w-full bg-surface border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-accent focus:border-transparent outline-none transition resize-none placeholder-slate-600 text-sm"
                                                    />
                                                ) : (
                                                    <input 
                                                        type={field.type}
                                                        name={field.name}
                                                        value={data[field.name]}
                                                        onChange={handleChange}
                                                        placeholder={field.placeholder}
                                                        className="w-full bg-surface border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-accent focus:border-transparent outline-none transition placeholder-slate-600 text-sm"
                                                    />
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </motion.div>
                            </AnimatePresence>
                        </div>

                        {/* Footer Controls */}
                        <div className="p-8 pt-6 flex justify-between items-center shrink-0 border-t border-slate-800 bg-brand">
                            <button 
                                onClick={handlePrev}
                                className={`px-6 py-2 rounded-md font-medium transition ${currentStep === 0 ? 'opacity-50 cursor-not-allowed text-slate-500' : 'text-slate-300 hover:text-white hover:bg-surface'}`}
                                disabled={currentStep === 0}
                            >
                                Back
                            </button>
                            
                            {currentStep === WIZARD_STEPS.length - 1 ? (
                                <button 
                                    onClick={generatePDF}
                                    disabled={isGenerating}
                                    className="bg-green-600 hover:bg-green-500 text-white px-8 py-3 rounded-lg font-semibold transition shadow-lg shadow-green-900/50 flex items-center gap-2 disabled:opacity-70"
                                >
                                    {isGenerating ? 'Generating...' : 'Download PDF'}
                                </button>
                            ) : (
                                <button 
                                    onClick={handleNext}
                                    className="bg-accent hover:bg-blue-500 text-white px-8 py-3 rounded-lg font-semibold transition shadow-lg shadow-blue-900/50"
                                >
                                    Continue
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Right Panel: Live Document Preview */}
                    <div className="hidden md:flex w-7/12 bg-slate-200 justify-center p-8 overflow-y-auto custom-scroll">
                        
                        {/* Wrapper to scale the A4 page down visually but keep real dimensions for PDF */}
                        <div className="origin-top scale-[0.85] xl:scale-95 transition-transform duration-300 pb-20">
                            
                            <motion.div layout id="resume-pdf-content" className="a4-page p-12 flex flex-col text-slate-800 relative">
                                
                                {/* Header */}
                                <div className="border-b-2 border-slate-800 pb-5 mb-5 text-center">
                                    <h1 className="text-4xl font-bold uppercase tracking-wide text-slate-900 mb-1">
                                        {data.fullName || 'Your Name'}
                                    </h1>
                                    <h2 className="text-lg font-semibold text-accent mb-3 tracking-wider">
                                        {data.role || 'Professional Title'}
                                    </h2>
                                    <div className="flex flex-wrap justify-center gap-x-4 gap-y-1 text-xs text-slate-600 font-medium">
                                        {data.email && <span>{data.email}</span>}
                                        {data.phone && <span>• {data.phone}</span>}
                                        {data.location && <span>• {data.location}</span>}
                                    </div>
                                    <div className="flex flex-wrap justify-center gap-x-4 mt-1 text-xs text-slate-500">
                                        {data.links}
                                    </div>
                                </div>

                                {/* Summary */}
                                {(data.summary || data.targetRole) && (
                                    <div className="mb-5">
                                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-widest border-b border-slate-300 mb-2 pb-1">Professional Summary</h3>
                                        <p className="text-xs text-slate-700 leading-relaxed text-justify">
                                            {data.summary || 'Summary text will appear here.'}
                                        </p>
                                    </div>
                                )}

                                {/* Skills */}
                                {(data.techSkills || data.softSkills) && (
                                    <div className="mb-5">
                                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-widest border-b border-slate-300 mb-2 pb-1">Skills</h3>
                                        {data.techSkills && (
                                            <div className="text-xs mb-1"><span className="font-bold text-slate-700">Technical:</span> {data.techSkills}</div>
                                        )}
                                        {data.softSkills && (
                                            <div className="text-xs"><span className="font-bold text-slate-700">Soft Skills:</span> {data.softSkills}</div>
                                        )}
                                    </div>
                                )}

                                {/* Experience */}
                                {(data.company || data.jobTitle) && (
                                    <div className="mb-5">
                                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-widest border-b border-slate-300 mb-2 pb-1">Work Experience</h3>
                                        <div className="flex justify-between items-baseline mb-1">
                                            <h4 className="text-sm font-bold text-slate-900">{data.jobTitle || 'Job Title'}</h4>
                                            <span className="text-xs font-semibold text-slate-600">{data.expDuration || 'Date - Date'}</span>
                                        </div>
                                        <div className="text-xs font-medium text-accent mb-2">{data.company || 'Company Name'}</div>
                                        <div className="text-xs text-slate-700 leading-relaxed whitespace-pre-line pl-3 border-l-2 border-slate-200">
                                            {data.responsibilities || '• Responsibilities and achievements.'}
                                        </div>
                                    </div>
                                )}

                                {/* Projects */}
                                {(data.projTitle || data.projDesc) && (
                                    <div className="mb-5">
                                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-widest border-b border-slate-300 mb-2 pb-1">Key Projects</h3>
                                        <div className="flex justify-between items-baseline mb-1">
                                            <h4 className="text-sm font-bold text-slate-900">{data.projTitle || 'Project Title'}</h4>
                                        </div>
                                        <div className="text-xs font-medium text-slate-500 mb-2 border-l-2 border-accent pl-2">{data.projTech || 'Technologies Used'}</div>
                                        <div className="text-xs text-slate-700 leading-relaxed whitespace-pre-line pl-3">
                                            {data.projDesc || '• Project description.'}
                                        </div>
                                    </div>
                                )}

                                {/* Education */}
                                {(data.degree || data.university) && (
                                    <div className="mb-5">
                                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-widest border-b border-slate-300 mb-2 pb-1">Education</h3>
                                        <div className="flex justify-between items-baseline mb-1">
                                            <h4 className="text-sm font-bold text-slate-900">{data.degree || 'Degree Name'}</h4>
                                            <span className="text-xs font-semibold text-slate-600">{data.eduDuration}</span>
                                        </div>
                                        <div className="flex justify-between items-baseline text-xs">
                                            <span className="text-slate-700">{data.university || 'University Name'}</span>
                                            {data.cgpa && <span className="font-medium">CGPA: {data.cgpa}</span>}
                                        </div>
                                    </div>
                                )}

                                {/* Extras */}
                                {(data.certifications || data.languages || data.interests) && (
                                    <div className="mb-5">
                                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-widest border-b border-slate-300 mb-2 pb-1">Additional Information</h3>
                                        <div className="grid grid-cols-2 gap-4 text-xs text-slate-700">
                                            {data.certifications && <div><span className="font-bold">Certifications:</span><br/>{data.certifications}</div>}
                                            {data.languages && <div><span className="font-bold">Languages:</span><br/>{data.languages}</div>}
                                            {data.interests && <div className="col-span-2"><span className="font-bold">Interests:</span> {data.interests}</div>}
                                        </div>
                                    </div>
                                )}

                            </motion.div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
