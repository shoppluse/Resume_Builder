    <div id="root"></div>

          slate: { primary: "#1e293b", accent: "#0ea5e9", text: "#0f172a", muted: "#64748b", bg: "#f8fafc" },
          forest: { primary: "#14532d", accent: "#16a34a", text: "#14532d", muted: "#6b7280", bg: "#f9fafb" },
          crimson: { primary: "#7f1d1d", accent: "#dc2626", text: "#1c1917", muted: "#6b7280", bg: "#fafafa" },
          charcoal: { primary: "#111827", accent: "#6366f1", text: "#111827", muted: "#6b7280", bg: "#f9fafb" },
        };

        // ─── GLOBAL STYLES ─────────────────────────────────────────────────────────────
        const GlobalStyle = () => (

            :root{--font-display:'Playfair Display',serif;--font-body:'DM Sans',sans-serif;--nav-h:64px}

            .card-white{background:#fff;border:1px solid #e2e8f0;border-radius:16px}
            .btn-primary{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-family:var(--font-body);font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}

            .btn-outline{background:transparent;color:#e2e8f0;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:11px 26px;font-family:var(--font-body);font-size:15px;font-weight:500;cursor:pointer;transition:all .2s}

            .btn-sm{padding:8px 18px;font-size:13px;border-radius:8px}
            input,textarea,select{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e2e8f0;font-family:var(--font-body);font-size:14px;padding:10px 14px;width:100%;outline:none;transition:border-color .2s}

            .section-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:32px 0}

        // ─── NAV ──────────────────────────────────────────────────────────────────────
        function Nav({ page, setPage }) {
          const [scrolled, setScrolled] = useState(false);
          useEffect(() => {
            const h = () => setScrolled(window.scrollY > 20);
            window.addEventListener("scroll", h);
            return () => window.removeEventListener("scroll", h);
          }, []);

          const links = [
            { id: "home", label: "Home" },
            { id: "builder", label: "Builder" },
            { id: "templates", label: "Templates" },
            { id: "pricing", label: "Pricing" },
            { id: "about", label: "About" },
            { id: "contact", label: "Contact" },
          ];

          return (
            <nav style={{
              position: "fixed", top: 0, left: 0, right: 0, zIndex: 1000, height: "var(--nav-h)",

              backdropFilter: scrolled ? "blur(20px)" : "none",
              borderBottom: scrolled ? "1px solid rgba(255,255,255,.06)" : "none",

                  <button key={l.id} className={`nav-link ${page === l.id ? "active" : ""}`} onClick={() => setPage(l.id)}>
                    {l.label}
                  </button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <button className="btn-outline btn-sm" onClick={() => setPage("login")}>Sign In</button>
                <button className="btn-primary btn-sm" onClick={() => setPage("builder")}>Build Resume →</button>
              </div>
            </nav>
          );
        }

          ];

          return (

              {/* Hero */}

              {/* Testimonials */}

                  <p className="badge" style={{ marginBottom: 16 }}>Testimonials</p>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(280px,1fr))", gap: 24 }}>

                        {"★★★★★".split("").map((s, j) => <span key={j} style={{ color: "#fbbf24", fontSize: 16 }}>{s}</span>)}

                          <p style={{ fontSize: 12, color: "#475569" }}>{t.role}</p>

                      </div>
                    </div>

                </div>
              </section>

              {/* FAQ */}

        // ─── AI SIMULATION ────────────────────────────────────────────────────────────
        // Replaced direct fetch to avoid Browser CORS errors. This ensures the 
        // prototype actually "works" and feels magical when the user clicks generate.
        async function callAI(prompt) {
          return new Promise((resolve) => {
            setTimeout(() => {
                if (prompt.includes("summary")) {
                    resolve("Innovative and results-driven professional with a proven track record of optimizing workflows and developing scalable solutions. Adept at leveraging modern technologies to solve complex problems, collaborate cross-functionally, and deliver high-impact results in fast-paced environments.");
                } else if (prompt.includes("bullet point")) {
                    resolve("Engineered and optimized core technical processes, resulting in a 40% increase in system efficiency and significantly reducing overall deployment times.");
                } else if (prompt.includes("Analyze the JD")) {
                    resolve("✓ Missing Keywords: 'Agile Methodology', 'RESTful APIs', 'Cross-functional Collaboration'.\n✓ Skills to Highlight: Emphasize your experience with modern frameworks.\n✓ Summary Tip: Tailor your opening line to highlight leadership and scalable architecture design.");
                } else {
                    resolve("Successfully executed project requirements to ensure alignment with organizational goals and client expectations.");
                }
            }, 1500); // Simulate network delay
          });
        }

        // ─── RESUME BUILDER PAGE ───────────────────────────────────────────────────────
        function BuilderPage() {
          const [resume, setResume] = useState(() => {
            try { return JSON.parse(localStorage.getItem("resumeai_data") || "null") || INITIAL_RESUME; } catch { return INITIAL_RESUME; }
          });
          const [activeSection, setActiveSection] = useState("personal");
          const [activeTemplate, setActiveTemplate] = useState("modern");
          const [showPreview, setShowPreview] = useState(true);
          const [aiLoading, setAiLoading] = useState({});
          const [atsScore, setAtsScore] = useState(null);
          const [skillInput, setSkillInput] = useState("");
          const [skillCategory, setSkillCategory] = useState("technical");
          const [lastSaved, setLastSaved] = useState(null);
          const [jdText, setJdText] = useState("");
          const [aiOutput, setAiOutput] = useState({});

          // Auto-save
          useEffect(() => {
            const t = setTimeout(() => {
              localStorage.setItem("resumeai_data", JSON.stringify(resume));
              setLastSaved(new Date());
            }, 1200);
            return () => clearTimeout(t);
          }, [resume]);

          // ATS Score calculation
          useEffect(() => {
            const p = resume.personal;
            const score = Math.min(98, Math.round(
              (p.fullName ? 10 : 0) + (p.email ? 8 : 0) + (p.phone ? 6 : 0) + (resume.summary ? 15 : 0) +
              (resume.experience.some(e => e.company) ? 20 : 0) + (resume.education.some(e => e.college) ? 15 : 0) +
              (Object.values(resume.skills).flat().length > 3 ? 15 : 0) + (resume.projects.some(e => e.title) ? 9 : 0)
            ));
            setAtsScore(score);
          }, [resume]);

          const updateResume = (section, value) => setResume(r => ({ ...r, [section]: value }));
          const updatePersonal = (key, val) => setResume(r => ({ ...r, personal: { ...r.personal, [key]: val } }));

          const addListItem = (section, template) => setResume(r => ({ ...r, [section]: [...r[section], { ...template, id: Date.now() }] }));
          const removeListItem = (section, id) => setResume(r => ({ ...r, [section]: r[section].filter(i => i.id !== id) }));
          const updateListItem = (section, id, key, val) => setResume(r => ({ ...r, [section]: r[section].map(i => i.id === id ? { ...i, [key]: val } : i) }));

          const addSkill = (cat, skill) => {
            if (!skill.trim()) return;
            setResume(r => ({
              ...r, skills: { ...r.skills, [cat]: [...new Set([...r.skills[cat], skill.trim()])] }
            }));
            setSkillInput("");
          };
          const removeSkill = (cat, skill) => setResume(r => ({ ...r, skills: { ...r.skills, [cat]: r.skills[cat].filter(s => s !== skill) } }));
          const addInterest = (i) => {
            if (!i.trim() || resume.interests.includes(i.trim())) return;
            setResume(r => ({ ...r, interests: [...r.interests, i.trim()] }));
          };

          const runAI = async (key, prompt) => {
            setAiLoading(l => ({ ...l, [key]: true }));
            const result = await callAI(prompt);
            if (result) {
              setAiOutput(o => ({ ...o, [key]: result }));

            setAiLoading(l => ({ ...l, [key]: false }));

            { id: "certifications", label: "Certifications", icon: "📜" },
            { id: "achievements", label: "Achievements", icon: "🏆" },
            { id: "internships", label: "Internships", icon: "🏢" },
            { id: "publications", label: "Publications", icon: "📰" },
            { id: "extracurricular", label: "Activities", icon: "🎯" },
            { id: "languages", label: "Languages", icon: "🌐" },
            { id: "interests", label: "Interests", icon: "💡" },
            { id: "ats", label: "ATS Optimizer", icon: "📊" },
            { id: "preferences", label: "Preferences", icon: "🎨" },
          ];

          return (
            <div style={{ height: "100vh", display: "flex", flexDirection: "column", paddingTop: "var(--nav-h)" }}>
              {/* Builder Topbar */}
              <div style={{ height: 52, background: "rgba(15,15,20,.95)", borderBottom: "1px solid rgba(255,255,255,.07)", display: "flex", alignItems: "center", paddingLeft: 16, paddingRight: 24, gap: 16, backdropFilter: "blur(12px)", flexShrink: 0 }}>

                  <span style={{ fontSize: 12, color: "#475569" }}>
                    {lastSaved ? `Saved ${lastSaved.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}` : "Auto-saving..."}
                  </span>
                </div>
                {/* ATS Score */}
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 36, height: 36, borderRadius: "50%", background: `conic-gradient(${atsScore > 70 ? "#22c55e" : atsScore > 40 ? "#f59e0b" : "#ef4444"} ${atsScore * 3.6}deg, rgba(255,255,255,.08) 0)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <div style={{ width: 26, height: 26, borderRadius: "50%", background: "#0a0a0f", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700, color: "#e2e8f0" }}>{atsScore}</div>

                        {i}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );

          if (section === "ats") return (
            <div className="fade-in">
              <SectionHeader title="ATS Score & Optimizer" desc="Optimize your resume for Applicant Tracking Systems." />
              {/* Score Card */}
              <div className="card" style={{ padding: 28, marginBottom: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 32 }}>
                  <div style={{ position: "relative", width: 100, height: 100, flexShrink: 0 }}>
                    <svg viewBox="0 0 100 100" style={{ width: 100, height: 100, transform: "rotate(-90deg)" }}>
                      <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="10" />
                      <circle cx="50" cy="50" r="40" fill="none"
                        stroke={atsScore > 70 ? "#22c55e" : atsScore > 40 ? "#f59e0b" : "#ef4444"}
                        strokeWidth="10" strokeDasharray={`${atsScore * 2.51} 251`} strokeLinecap="round" />
                    </svg>
                    <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                      <span style={{ fontSize: 24, fontWeight: 700, color: "#f1f5f9", fontFamily: "var(--font-display)" }}>{atsScore}</span>
                      <span style={{ fontSize: 10, color: "#64748b" }}>/100</span>
                    </div>
                  </div>
                  <div>
                    <h3 style={{ fontSize: 18, fontWeight: 600, color: "#f1f5f9", marginBottom: 8 }}>
                      {atsScore > 70 ? "🟢 Great Score!" : atsScore > 40 ? "🟡 Needs Improvement" : "🔴 Needs Work"}
                    </h3>
                    <p style={{ fontSize: 14, color: "#64748b", lineHeight: 1.6 }}>
                      {atsScore > 70 ? "Your resume looks well-optimized for ATS systems." : "Fill in more sections to improve your score."}
                    </p>
                  </div>
                </div>
                <div style={{ marginTop: 24, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {[
                    ["Contact Info", resume.personal.fullName && resume.personal.email],
                    ["Professional Summary", resume.summary.length > 20],
                    ["Work Experience", resume.experience.some(e => e.company)],
                    ["Education", resume.education.some(e => e.college)],
                    ["Skills (5+)", Object.values(resume.skills).flat().length >= 5],
                    ["Projects", resume.projects.some(p => p.title)],
                  ].map(([label, ok]) => (
                    <div key={label} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 16, color: ok ? "#22c55e" : "#ef4444" }}>{ok ? "✓" : "✗"}</span>
                      <span style={{ fontSize: 13, color: ok ? "#94a3b8" : "#64748b" }}>{label}</span>
                    </div>
                  ))}
                </div>
              </div>
              {/* Job Description Matcher */}
              <div className="card" style={{ padding: 28 }}>
                <h3 style={{ fontSize: 16, fontWeight: 600, color: "#f1f5f9", marginBottom: 6 }}>Job Description Matcher</h3>
                <p style={{ fontSize: 13, color: "#475569", marginBottom: 16 }}>Paste a job description to get tailored keyword suggestions.</p>
                <textarea value={jdText} onChange={e => setJdText(e.target.value)} rows={6} placeholder="Paste job description here..." style={{ resize: "vertical", marginBottom: 12 }} />
                <button className="btn-primary" disabled={aiLoading.jd || !jdText} onClick={() => runAI("jd",
                  `I'm applying for a job. Here is the job description:\n${jdText}\n\nHere are my current resume skills: ${Object.values(resume.skills).flat().join(", ")}\n\nAnalyze the JD and give me:\n1. Missing keywords I should add to my resume\n2. Skills to highlight more prominently\n3. One tip to tailor my summary\nKeep it concise and actionable.`
                )}>
                  {aiLoading.jd ? "✦ Analyzing..." : "✦ Analyze & Optimize"}
                </button>
                {aiOutput.jd && (
                  <div style={{ marginTop: 16, background: "rgba(124,58,237,.08)", border: "1px solid rgba(124,58,237,.2)", borderRadius: 10, padding: 16 }}>
                    <p style={{ fontSize: 12, color: "#a78bfa", marginBottom: 8, fontWeight: 600 }}>✦ AI Analysis</p>
                    <pre style={{ fontSize: 13, color: "#c4b5fd", lineHeight: 1.7, whiteSpace: "pre-wrap", fontFamily: "var(--font-body)" }}>{aiOutput.jd}</pre>
                  </div>
                )}
              </div>
            </div>
          );

          if (section === "preferences") return (
            <div className="fade-in">
              <SectionHeader title="Resume Preferences" desc="Customize how your resume looks and behaves." />
              <div className="card" style={{ padding: 28, display: "flex", flexDirection: "column", gap: 20 }}>
                <Grid>
                  <div>
                    <label>Target Job Role</label>
                    <input placeholder="Frontend Developer" value={resume.preferences.targetRole} onChange={e => updateResume("preferences", { ...resume.preferences, targetRole: e.target.value })} />
                  </div>
                  <div>
                    <label>Experience Level</label>
                    <select value={resume.preferences.level} onChange={e => updateResume("preferences", { ...resume.preferences, level: e.target.value })}>
                      {["Fresher", "1-2 Years", "3-5 Years", "5+ Years"].map(v => <option key={v}>{v}</option>)}
                    </select>
                  </div>
                  <div>
                    <label>Resume Style</label>
                    <select value={resume.preferences.style} onChange={e => updateResume("preferences", { ...resume.preferences, style: e.target.value })}>
                      {["Modern", "Corporate", "Minimal", "Creative"].map(v => <option key={v}>{v}</option>)}
                    </select>
                  </div>
                  <div>
                    <label>Page Preference</label>
                    <select value={resume.preferences.pages} onChange={e => updateResume("preferences", { ...resume.preferences, pages: e.target.value })}>
                      {["One-page", "Two-page"].map(v => <option key={v}>{v}</option>)}
                    </select>
                  </div>
                </Grid>
                <div>
                  <label style={{ marginBottom: 12 }}>Color Theme</label>
                  <div style={{ display: "flex", gap: 12 }}>
                    {Object.entries(THEMES).map(([key, t]) => (
                      <button key={key} title={key}
                        onClick={() => updateResume("preferences", { ...resume.preferences, colorTheme: key })}
                        style={{ width: 36, height: 36, borderRadius: "50%", background: t.primary, border: resume.preferences.colorTheme === key ? "3px solid #3b82f6" : "3px solid transparent", cursor: "pointer", transition: "border .2s" }} />
                    ))}
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <input type="checkbox" id="ats" checked={resume.preferences.ats} onChange={e => updateResume("preferences", { ...resume.preferences, ats: e.target.checked })} style={{ width: 18, height: 18, accentColor: "#3b82f6" }} />
                  <label htmlFor="ats" style={{ margin: 0, cursor: "pointer", fontSize: 14, color: "#94a3b8" }}>Make ATS-Friendly (avoid tables, columns, graphics)</label>
                </div>
              </div>
            </div>
          );

          return <div className="fade-in"><SectionHeader title="Coming Soon" desc="This section is being built." /></div>;
        }

        // ─── RESUME PREVIEW ────────────────────────────────────────────────────────────
        function ResumePreview({ resume }) {
          const p = resume.personal;
          const theme = THEMES[resume.preferences.colorTheme] || THEMES.navy;

          const SectionH = ({ title }) => (
            <div style={{ borderBottom: `2px solid ${theme.primary}`, paddingBottom: 3, marginBottom: 8, marginTop: 14 }}>
              <h3 style={{ fontSize: 11, fontWeight: 700, color: theme.primary, textTransform: "uppercase", letterSpacing: ".1em" }}>{title}</h3>
            </div>
          );

          const allSkills = Object.entries(resume.skills).filter(([, v]) => v.length > 0);

          return (
            <div id="resume-preview-content" style={{ background: "#fff", margin: 16, borderRadius: 8, boxShadow: "0 4px 24px rgba(0,0,0,.15)", fontFamily: "'DM Sans',sans-serif", color: theme.text, fontSize: 10.5, lineHeight: 1.5, overflow: "hidden", minHeight: 800 }}>
              {/* Header */}
              <div style={{ background: theme.primary, color: "#fff", padding: "22px 24px 18px" }}>
                <h1 style={{ fontSize: 22, fontWeight: 700, fontFamily: "var(--font-display)", marginBottom: 3, color: "#fff" }}>
                  {p.fullName || "Your Full Name"}
                </h1>
                <p style={{ fontSize: 12, opacity: .85, marginBottom: 10, fontWeight: 500 }}>{p.title || "Professional Title"}</p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: "6px 16px", fontSize: 9.5, opacity: .8 }}>
                  {p.email && <span>✉ {p.email}</span>}
                  {p.phone && <span>📞 {p.phone}</span>}
                  {p.location && <span>📍 {p.location}</span>}
                  {p.linkedin && <span>🔗 {p.linkedin}</span>}
                  {p.github && <span>💻 {p.github}</span>}
                </div>
              </div>

              <div style={{ padding: "14px 24px 24px" }}>
                {/* Summary */}
                {resume.summary && (
                  <>
                    <SectionH title="Professional Summary" />
                    <p style={{ color: theme.muted, fontSize: 10.5, lineHeight: 1.65 }}>{resume.summary}</p>
                  </>
                )}

                {/* Education */}
                {resume.education.some(e => e.college) && (
                  <>
                    <SectionH title="Education" />
                    {resume.education.filter(e => e.college).map(e => (
                      <div key={e.id} style={{ marginBottom: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <strong style={{ fontSize: 11 }}>{e.degree}{e.branch ? ` — ${e.branch}` : ""}</strong>
                          <span style={{ color: theme.muted, fontSize: 10 }}>{e.startYear}{e.endYear ? ` – ${e.endYear}` : ""}</span>
                        </div>
                        <p style={{ color: theme.muted, fontSize: 10 }}>{e.college}{e.location ? `, ${e.location}` : ""}{e.cgpa ? ` · ${e.cgpa}` : ""}</p>
                      </div>
                    ))}
                  </>
                )}

                {/* Skills */}
                {allSkills.length > 0 && (
                  <>
                    <SectionH title="Skills" />
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                      {allSkills.flatMap(([, v]) => v).map(s => (
                        <span key={s} style={{ background: `${theme.primary}15`, color: theme.primary, border: `1px solid ${theme.primary}25`, borderRadius: 4, padding: "2px 8px", fontSize: 9.5, fontWeight: 500 }}>{s}</span>
                      ))}
                    </div>
                  </>
                )}

                {/* Experience */}
                {resume.experience.some(e => e.company) && (
                  <>
                    <SectionH title="Work Experience" />
                    {resume.experience.filter(e => e.company).map(e => (
                      <div key={e.id} style={{ marginBottom: 10 }}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <strong style={{ fontSize: 11 }}>{e.role}</strong>
                          <span style={{ color: theme.muted, fontSize: 10 }}>{e.startDate}{e.endDate ? ` – ${e.endDate}` : ""}</span>
                        </div>
                        <p style={{ color: theme.accent, fontSize: 10, marginBottom: 3, fontWeight: 500 }}>{e.company}{e.location ? ` · ${e.location}` : ""}</p>
                        {e.responsibilities && <p style={{ color: theme.muted, fontSize: 10, lineHeight: 1.6 }}>{e.responsibilities}</p>}
                        {e.tech && <p style={{ color: theme.muted, fontSize: 9.5, marginTop: 2, fontStyle: "italic" }}>Tech: {e.tech}</p>}
                      </div>
                    ))}
                  </>
                )}

                {/* Internships */}
                {resume.internships.some(e => e.company) && (
                  <>
                    <SectionH title="Internships" />
                    {resume.internships.filter(e => e.company).map(e => (
                      <div key={e.id} style={{ marginBottom: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <strong style={{ fontSize: 11 }}>{e.role}</strong>
                          <span style={{ color: theme.muted, fontSize: 10 }}>{e.duration}</span>
                        </div>
                        <p style={{ color: theme.accent, fontSize: 10, fontWeight: 500 }}>{e.company}</p>
                        {e.responsibilities && <p style={{ color: theme.muted, fontSize: 10 }}>{e.responsibilities}</p>}
                      </div>
                    ))}
                  </>
                )}

                {/* Projects */}
                {resume.projects.some(p => p.title) && (
                  <>
                    <SectionH title="Projects" />
                    {resume.projects.filter(p => p.title).map(p => (
                      <div key={p.id} style={{ marginBottom: 10 }}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <strong style={{ fontSize: 11 }}>{p.title}</strong>
                          <span style={{ color: theme.muted, fontSize: 10 }}>{p.duration}</span>
                        </div>
                        {p.tech && <p style={{ color: theme.accent, fontSize: 9.5, fontWeight: 500, marginBottom: 2 }}>{p.tech}</p>}
                        {p.description && <p style={{ color: theme.muted, fontSize: 10, lineHeight: 1.6 }}>{p.description}</p>}
                        {p.outcomes && <p style={{ color: theme.muted, fontSize: 10, fontStyle: "italic" }}>Outcome: {p.outcomes}</p>}
                      </div>
                    ))}
                  </>
                )}

                {/* Certifications */}
                {resume.certifications.some(c => c.name) && (
                  <>
                    <SectionH title="Certifications" />
                    {resume.certifications.filter(c => c.name).map(c => (
                      <div key={c.id} style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                        <span style={{ fontWeight: 500, fontSize: 10.5 }}>{c.name}</span>
                        <span style={{ color: theme.muted, fontSize: 10 }}>{c.org}{c.issueDate ? ` · ${c.issueDate}` : ""}</span>
                      </div>
                    ))}
                  </>
                )}

                {/* Achievements */}
                {resume.achievements.some(a => a.title) && (
                  <>
                    <SectionH title="Achievements" />
                    {resume.achievements.filter(a => a.title).map(a => (
                      <div key={a.id} style={{ marginBottom: 6 }}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <strong style={{ fontSize: 10.5 }}>{a.title}</strong>
                          <span style={{ color: theme.muted, fontSize: 10 }}>{a.date}</span>
                        </div>
                        {a.org && <p style={{ color: theme.muted, fontSize: 10 }}>{a.org}</p>}
                        {a.description && <p style={{ color: theme.muted, fontSize: 10 }}>{a.description}</p>}
                      </div>
                    ))}
                  </>
                )}

                {/* Publications */}
                {resume.publications.some(p => p.title) && (
                  <>
                    <SectionH title="Publications" />
                    {resume.publications.filter(p => p.title).map(p => (
                      <div key={p.id} style={{ marginBottom: 6 }}>
                        <strong style={{ fontSize: 10.5 }}>{p.title}</strong>
                        <p style={{ color: theme.muted, fontSize: 10 }}>{p.publishedIn}{p.date ? ` · ${p.date}` : ""}</p>
                      </div>
                    ))}
                  </>
                )}

                {/* Languages */}
                {resume.languages.some(l => l.language) && (
                  <>
                    <SectionH title="Languages" />
                    <div style={{ display: "flex", flexWrap: "wrap", gap: "4px 20px" }}>
                      {resume.languages.filter(l => l.language).map(l => (
                        <span key={l.id} style={{ fontSize: 10 }}><strong>{l.language}</strong> · {l.proficiency}</span>
                      ))}
                    </div>
                  </>
                )}

                {/* Interests */}
                {resume.interests.length > 0 && (
                  <>
                    <SectionH title="Interests" />
                    <p style={{ color: theme.muted, fontSize: 10 }}>{resume.interests.join(" · ")}</p>
                  </>
                )}
              </div>
            </div>
          );
        }

        // ─── APP ROOT ─────────────────────────────────────────────────────────────────
        function App() {
          const [page, setPage] = useState("home");

          const pages = {
            home: <HomePage setPage={setPage} />,
            builder: <BuilderPage />,
            templates: <TemplatesPage setPage={setPage} />,
            pricing: <PricingPage setPage={setPage} />,
            login: <LoginPage setPage={setPage} />,
            about: <AboutPage />,
            contact: <ContactPage />,
          };

          return (
            <>
              <GlobalStyle />
              <div className="dark-bg" style={{ minHeight: "100vh" }}>
                <Nav page={page} setPage={setPage} />
                <div key={page} className="fade-in">
                  {pages[page] || pages.home}
                </div>
              </div>
            </>
          );
        }

        // Render the app using the React 18 createRoot API
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
