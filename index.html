<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Resume Builder AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#0f172a', accent: '#3b82f6' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .a4-page { aspect-ratio: 1 / 1.414; background: white; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        @media print {
            body { visibility: hidden; background: white; }
            #resume-preview { visibility: visible; position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { motion } = window.Motion;

        function App() {
            const [data, setData] = useState({
                fullName: 'Jane Doe',
                role: 'Senior Software Engineer',
                email: 'jane.doe@example.com',
                phone: '+1 (555) 123-4567',
                summary: 'Innovative software engineer with 5+ years of experience in building scalable React applications and leading agile teams to deliver premium SaaS products.',
                experience: 'Lead Developer at TechCorp (2020 - Present)\n- Spearheaded the transition to a micro-frontend architecture.\n- Improved application load time by 40%.'
            });

            const handleChange = (e) => {
                setData({ ...data, [e.target.name]: e.target.value });
            };

            const handlePrint = () => window.print();

            return (
                <div className="min-h-screen flex flex-col h-screen overflow-hidden">
                    {/* Navigation */}
                    <nav className="bg-brand text-white py-4 px-8 flex justify-between items-center no-print shrink-0">
                        <div className="text-xl font-bold tracking-tight">Resume<span className="text-accent">AI</span></div>
                        <div className="space-x-4">
                            <button className="text-sm font-medium hover:text-accent transition">Templates</button>
                            <button onClick={handlePrint} className="bg-accent hover:bg-blue-600 px-4 py-2 rounded-md text-sm font-semibold transition shadow-lg">Download PDF</button>
                        </div>
                    </nav>

                    {/* Main Workspace */}
                    <div className="flex-1 flex overflow-hidden">
                        {/* Editor Sidebar */}
                        <div className="w-1/3 bg-white border-r border-slate-200 p-8 overflow-y-auto no-print shadow-sm z-10">
                            <h2 className="text-2xl font-semibold mb-6 text-slate-800">Personal Details</h2>
                            
                            <div className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium text-slate-600 mb-1">Full Name</label>
                                    <input type="text" name="fullName" value={data.fullName} onChange={handleChange} className="w-full border border-slate-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-accent focus:border-accent outline-none transition" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-600 mb-1">Professional Title</label>
                                    <input type="text" name="role" value={data.role} onChange={handleChange} className="w-full border border-slate-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-accent focus:border-accent outline-none transition" />
                                </div>
                                <div className="flex gap-4">
                                    <div className="w-1/2">
                                        <label className="block text-sm font-medium text-slate-600 mb-1">Email</label>
                                        <input type="email" name="email" value={data.email} onChange={handleChange} className="w-full border border-slate-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-accent focus:border-accent outline-none transition" />
                                    </div>
                                    <div className="w-1/2">
                                        <label className="block text-sm font-medium text-slate-600 mb-1">Phone</label>
                                        <input type="text" name="phone" value={data.phone} onChange={handleChange} className="w-full border border-slate-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-accent focus:border-accent outline-none transition" />
                                    </div>
                                </div>
                                <div>
                                    <div className="flex justify-between items-center mb-1">
                                        <label className="block text-sm font-medium text-slate-600">Professional Summary</label>
                                        <button className="text-xs text-accent font-medium flex items-center hover:underline">✨ AI Rewrite</button>
                                    </div>
                                    <textarea name="summary" value={data.summary} onChange={handleChange} rows="4" className="w-full border border-slate-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-accent focus:border-accent outline-none transition resize-none"></textarea>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-600 mb-1">Experience</label>
                                    <textarea name="experience" value={data.experience} onChange={handleChange} rows="6" className="w-full border border-slate-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-accent focus:border-accent outline-none transition resize-none"></textarea>
                                </div>
                            </div>
                        </div>

                        {/* Live Preview Area */}
                        <div className="w-2/3 bg-slate-50 flex justify-center p-8 overflow-y-auto">
                            <motion.div 
                                id="resume-preview"
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 0.5 }}
                                className="a4-page w-full max-w-3xl p-12 flex flex-col"
                            >
                                {/* Resume Header */}
                                <div className="border-b-2 border-slate-800 pb-6 mb-6">
                                    <motion.h1 key={data.fullName} initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="text-4xl font-bold text-slate-900 mb-2">{data.fullName || 'Your Name'}</motion.h1>
                                    <h2 className="text-xl font-medium text-accent mb-4">{data.role || 'Your Title'}</h2>
                                    <div className="flex gap-6 text-sm text-slate-600 font-medium">
                                        <span>{data.email}</span>
                                        <span>{data.phone}</span>
                                    </div>
                                </div>

                                {/* Resume Summary */}
                                <div className="mb-8">
                                    <h3 className="text-lg font-bold text-slate-800 mb-3 uppercase tracking-wider text-sm">Profile</h3>
                                    <p className="text-slate-700 leading-relaxed text-sm">{data.summary}</p>
                                </div>

                                {/* Resume Experience */}
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-3 uppercase tracking-wider text-sm">Experience</h3>
                                    <div className="text-slate-700 leading-relaxed text-sm whitespace-pre-line">
                                        {data.experience}
                                    </div>
                                </div>
                            </motion.div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
