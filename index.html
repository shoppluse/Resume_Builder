<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Wizard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#0f172a', accent: '#3b82f6', surface: '#1e293b' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; overflow: hidden;}
        .a4-page { aspect-ratio: 1 / 1.414; background: white; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        /* Hide scrollbar for clean UI but allow scrolling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Define the sequence of questions
        const WIZARD_STEPS = [
            {
                id: 'intro',
                title: 'Let’s start with the basics.',
                subtitle: 'What is your name and contact info?',
                fields: [
                    { name: 'fullName', label: 'Full Name', type: 'text', placeholder: 'e.g. Alex Smith' },
                    { name: 'email', label: 'Email Address', type: 'email', placeholder: 'alex@example.com' }
                ]
            },
            {
                id: 'role',
                title: 'What do you do?',
                subtitle: 'Enter your current or target professional title.',
                fields: [
                    { name: 'role', label: 'Professional Title', type: 'text', placeholder: 'e.g. Web Developer & Entrepreneur' }
                ]
            },
            {
                id: 'projects',
                title: 'Highlight a major project.',
                subtitle: 'What is a significant project you have built?',
                fields: [
                    { name: 'projectTitle', label: 'Project Name', type: 'text', placeholder: 'e.g. Shoppluse' },
                    { name: 'projectDesc', label: 'Description', type: 'textarea', placeholder: 'e.g. Developed a cashback and affiliate platform with fully integrated 4-5 star Amazon product filtering...' }
                ]
            },
            {
                id: 'skills',
                title: 'What are your core skills?',
                subtitle: 'List a few key technologies or domains you excel in.',
                fields: [
                    { name: 'skills', label: 'Skills (comma separated)', type: 'text', placeholder: 'e.g. React, Tailwind, Home Automation, Social Media Marketing' }
                ]
            }
        ];

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [direction, setDirection] = useState(1); // 1 for forward, -1 for backward
            const [data, setData] = useState({
                fullName: '',
                email: '',
                role: '',
                projectTitle: '',
                projectDesc: '',
                skills: ''
            });

            const handleNext = () => {
                if (currentStep < WIZARD_STEPS.length - 1) {
                    setDirection(1);
                    setCurrentStep(prev => prev + 1);
                }
            };

            const handlePrev = () => {
                if (currentStep > 0) {
                    setDirection(-1);
                    setCurrentStep(prev => prev - 1);
                }
            };

            const handleChange = (e) => {
                setData({ ...data, [e.target.name]: e.target.value });
            };

            const step = WIZARD_STEPS[currentStep];

            // Animation variants for the sliding effect
            const variants = {
                enter: (direction) => ({
                    x: direction > 0 ? 50 : -50,
                    opacity: 0
                }),
                center: {
                    x: 0,
                    opacity: 1
                },
                exit: (direction) => ({
                    x: direction < 0 ? 50 : -50,
                    opacity: 0
                })
            };

            return (
                <div className="flex h-screen w-full bg-slate-50">
                    
                    {/* Left Side: The Interactive Wizard */}
                    <div className="w-full md:w-5/12 bg-brand text-white flex flex-col relative z-10 shadow-2xl">
                        
                        {/* Header */}
                        <div className="p-8 pb-0 flex justify-between items-center">
                            <div className="text-xl font-bold tracking-tight">Resume<span className="text-accent">AI</span></div>
                            <div className="text-sm font-medium text-slate-400">Step {currentStep + 1} of {WIZARD_STEPS.length}</div>
                        </div>

                        {/* Progress Bar */}
                        <div className="w-full bg-surface h-1 mt-6">
                            <motion.div 
                                className="bg-accent h-full" 
                                initial={{ width: 0 }}
                                animate={{ width: `${((currentStep + 1) / WIZARD_STEPS.length) * 100}%` }}
                                transition={{ duration: 0.3 }}
                            />
                        </div>

                        {/* Question Area */}
                        <div className="flex-1 flex flex-col justify-center px-12 py-8 relative overflow-hidden">
                            <AnimatePresence mode="wait" custom={direction}>
                                <motion.div
                                    key={currentStep}
                                    custom={direction}
                                    variants={variants}
                                    initial="enter"
                                    animate="center"
                                    exit="exit"
                                    transition={{ type: "tween", duration: 0.3 }}
                                    className="w-full max-w-md absolute"
                                    style={{ top: '50%', transform: 'translateY(-50%)' }}
                                >
                                    <h2 className="text-3xl font-bold mb-2">{step.title}</h2>
                                    <p className="text-slate-400 mb-8">{step.subtitle}</p>

                                    <div className="space-y-6">
                                        {step.fields.map(field => (
                                            <div key={field.name}>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">{field.label}</label>
                                                {field.type === 'textarea' ? (
                                                    <textarea 
                                                        name={field.name}
                                                        value={data[field.name]}
                                                        onChange={handleChange}
                                                        placeholder={field.placeholder}
                                                        rows="4"
                                                        className="w-full bg-surface border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-accent focus:border-transparent outline-none transition resize-none placeholder-slate-500"
                                                    />
                                                ) : (
                                                    <input 
                                                        type={field.type}
                                                        name={field.name}
                                                        value={data[field.name]}
                                                        onChange={handleChange}
                                                        placeholder={field.placeholder}
                                                        className="w-full bg-surface border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-accent focus:border-transparent outline-none transition placeholder-slate-500"
                                                    />
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </motion.div>
                            </AnimatePresence>
                        </div>

                        {/* Navigation Footer */}
                        <div className="p-8 pt-0 flex justify-between items-center mt-auto">
                            <button 
                                onClick={handlePrev}
                                className={`px-6 py-2 rounded-md font-medium transition ${currentStep === 0 ? 'opacity-0 pointer-events-none' : 'text-slate-300 hover:text-white hover:bg-surface'}`}
                            >
                                Back
                            </button>
                            
                            {currentStep === WIZARD_STEPS.length - 1 ? (
                                <button className="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-lg font-semibold transition shadow-lg shadow-green-500/30 flex items-center gap-2">
                                    Finish & Download PDF
                                </button>
                            ) : (
                                <button 
                                    onClick={handleNext}
                                    className="bg-accent hover:bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold transition shadow-lg shadow-blue-500/30"
                                >
                                    Continue
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Right Side: Live Document Preview */}
                    <div className="hidden md:flex w-7/12 bg-slate-200 justify-center items-center p-8 overflow-y-auto">
                        <motion.div 
                            layout
                            className="a4-page w-full max-w-2xl p-12 flex flex-col bg-white rounded-sm"
                        >
                            {/* Header Preview */}
                            <div className="border-b border-slate-300 pb-6 mb-6">
                                <h1 className="text-4xl font-bold text-slate-900 mb-1 tracking-tight">
                                    {data.fullName || <span className="text-slate-300">Your Name</span>}
                                </h1>
                                <h2 className="text-lg font-medium text-accent mb-3">
                                    {data.role || <span className="text-blue-200">Professional Title</span>}
                                </h2>
                                <div className="text-sm text-slate-500">
                                    {data.email || 'email@example.com'}
                                </div>
                            </div>

                            {/* Body Preview */}
                            <div className="flex flex-col gap-6">
                                {/* Projects Section */}
                                <div>
                                    <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-2">Selected Project</h3>
                                    <div className="mb-1 font-semibold text-slate-700">
                                        {data.projectTitle || <span className="text-slate-300">Project Name</span>}
                                    </div>
                                    <p className="text-sm text-slate-600 leading-relaxed">
                                        {data.projectDesc || <span className="text-slate-300">Description of your project and the technologies used will appear here.</span>}
                                    </p>
                                </div>

                                {/* Skills Section */}
                                <div>
                                    <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-2">Core Skills</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {data.skills ? data.skills.split(',').map((skill, i) => (
                                            <span key={i} className="px-3 py-1 bg-slate-100 text-slate-700 text-xs font-medium rounded-md">
                                                {skill.trim()}
                                            </span>
                                        )) : (
                                            <span className="px-3 py-1 bg-slate-50 text-slate-300 text-xs font-medium rounded-md border border-dashed border-slate-200">
                                                Skills will appear here
                                            </span>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </motion.div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
